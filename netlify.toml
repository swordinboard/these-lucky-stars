[build]
  publish = "public"
  command = "hugo --minify"

[build.environment]
  HUGO_VERSION = "0.148.1"
  HUGO_EXTENDED = "true"
  
# ===========================================
# SECURITY HEADERS
# ===========================================
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "0"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"

# ===========================================
# CACHE HEADERS FOR STATIC ASSETS
# ===========================================
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# ===========================================
# REDIRECTS
# ===========================================

# www → apex
[[redirects]]
  from = "https://www.theseluckystars.com/*"
  to = "https://theseluckystars.com/:splat"
  status = 301
  force = true

# ===========================================
# LEGACY URL REDIRECTS
# Fixes Google Search Console 404s caused by
# historical content restructuring.
# Specific rules must come before wildcards.
# ===========================================

# /core-ruleset/ (old top-level section, now under /docs/free-srd/)
[[redirects]]
  from = "/core-ruleset/"
  to = "/docs/free-srd/"
  status = 301

[[redirects]]
  from = "/core-ruleset/*"
  to = "/docs/free-srd/core-rules/:splat"
  status = 301

# /docs/core-ruleset/ (same old section, accessed via /docs/ prefix)
[[redirects]]
  from = "/docs/core-ruleset/introduction/"
  to = "/docs/free-srd/"
  status = 301

[[redirects]]
  from = "/docs/core-ruleset/ohnothoughts/"
  to = "/docs/free-srd/"
  status = 301

[[redirects]]
  from = "/docs/core-ruleset/"
  to = "/docs/free-srd/"
  status = 301

[[redirects]]
  from = "/docs/core-ruleset/*"
  to = "/docs/free-srd/core-rules/:splat"
  status = 301

# Pages that moved into /core-rules/ subsection
[[redirects]]
  from = "/docs/free-srd/basics/"
  to = "/docs/free-srd/core-rules/basics/"
  status = 301

[[redirects]]
  from = "/docs/free-srd/stats/"
  to = "/docs/free-srd/core-rules/stats/"
  status = 301

[[redirects]]
  from = "/docs/free-srd/attributes/"
  to = "/docs/free-srd/core-rules/attributes/"
  status = 301

[[redirects]]
  from = "/docs/free-srd/health-combat/"
  to = "/docs/free-srd/core-rules/health/"
  status = 301

# /inventory-equipment/ → /inventory--equipment/ (single → double dash)
# Specific renamed sub-page first, then wildcard
[[redirects]]
  from = "/docs/free-srd/inventory-equipment/sci-fi-equipment/sci-fi-items--equipment/"
  to = "/docs/free-srd/inventory--equipment/sci-fi-equipment/sci-fi-misc-equipment/"
  status = 301

[[redirects]]
  from = "/docs/free-srd/inventory-equipment/*"
  to = "/docs/free-srd/inventory--equipment/:splat"
  status = 301

# Removed or drafted-out pages → nearest valid parent
[[redirects]]
  from = "/docs/free-srd/sci-fi-module/"
  to = "/docs/free-srd/"
  status = 301

[[redirects]]
  from = "/docs/ohnothoughts/"
  to = "/"
  status = 301

# Bare /attributes/ that existed at root level
[[redirects]]
  from = "/attributes/"
  to = "/docs/free-srd/core-rules/attributes/"
  status = 301